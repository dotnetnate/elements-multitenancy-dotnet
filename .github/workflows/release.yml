# Build, test, report code quality, and publish packages
# - Every push/PR: build → test → coverage → quality report (job summary + check run)
# - Main branch only: deploy HTML report to GitHub Pages, pack and push NuGet packages

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch: {}

permissions:
  contents: write # push to gh-pages branch
  checks: write # publish-unit-test-result-action creates check runs
  pull-requests: write # publish-unit-test-result-action can comment on PRs

env:
  SOLUTION_ROOT: ./src
  SOLUTION_FILE_NAME: full-solution.slnx
  NUGET_FEED_NAME: github
  NUGET_FEED_URL: https://nuget.pkg.github.com/dotnetnate/index.json

jobs:
  create-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      tag_ref: ${{ steps.bump.outputs.tag_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute and push next patch tag
        id: bump
        run: |
          latest=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi
          major=$(echo "$latest" | sed 's/^v//' | cut -d. -f1)
          minor=$(echo "$latest" | cut -d. -f2)
          patch=$(echo "$latest" | cut -d. -f3)
          new_tag="v${major}.${minor}.$((patch + 1))"
          echo "Bumping $latest → $new_tag"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$new_tag"
          git push origin "$new_tag"
          echo "tag_ref=refs/tags/$new_tag" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: build — restore, build, test, upload outputs for downstream jobs
  # ──────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [create-tag]
    if: needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag_ref || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Install reporting tools
        run: dotnet tool install --global dotnet-coverage

      - name: Configure NuGet feed
        run: dotnet nuget add source --name ${{ env.NUGET_FEED_NAME }} ${{ env.NUGET_FEED_URL }}

      - name: Restore dependencies
        run: dotnet restore $SOLUTION_ROOT/$SOLUTION_FILE_NAME
        env:
          NuGetPackageSourceCredentials_${{ env.NUGET_FEED_NAME }}: Username=dotnetnate;Password=${{ secrets.PACKAGES_TOKEN }}

      - name: Build
        run: |
          dotnet build $SOLUTION_ROOT/$SOLUTION_FILE_NAME --no-restore -c Release \
            /p:VersionPatch=${{ github.run_number }} \
            /p:PackageVersionMetadata=ci-${{ github.sha }}

      - name: Count Lines of Code (cloc)
        uses: djdefi/cloc-action@6
        with:
          options: "--exclude-lang=YAML --md --report-file=cloc.md"

      # ---------- Test + Coverage Collection ----------

      - name: Test with coverage
        run: |
          dotnet-coverage collect \
            --settings $SOLUTION_ROOT/codecoverage.runsettings \
            --output-format cobertura \
            --output ./test-results/coverage.cobertura.xml \
            -- dotnet test \
              --solution $SOLUTION_ROOT/$SOLUTION_FILE_NAME \
              --no-build -c Release \
              --report-trx \
              --results-directory ./test-results \
              --ignore-exit-code 8

      - name: List test result artifacts
        if: always()
        run: |
          echo "=== All files ==="
          find ./test-results -type f | sort
          echo ""
          echo "=== Cobertura files ==="
          find ./test-results -name "*.cobertura.xml" -type f
          echo ""
          echo "=== TRX files ==="
          find ./test-results -name "*.trx" -type f

      # ---------- Collect binaries ----------

      - name: Collect project binaries
        if: success()
        run: |
          mkdir -p ./output/binaries
          find ./src -name "*.csproj" ! -name "*Tests*" | while read -r csproj; do
            proj_name=$(basename "$csproj" .csproj)
            find "$(dirname "$csproj")/bin/Release" -type f \
              \( -name "${proj_name}.dll" -o -name "${proj_name}.pdb" \) \
              2>/dev/null | xargs -I{} cp {} ./output/binaries/ 2>/dev/null || true
          done

      # ---------- Upload artifacts for downstream jobs ----------

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results/
          if-no-files-found: warn

      - name: Upload project binaries
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: output-binaries
          path: ./output/binaries/
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: report — fancy-report, publish test results, deploy gh-pages
  #         runs in parallel with `publish` after `build` completes
  # ──────────────────────────────────────────────────────────────────────────
  report:
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ./test-results/

      - name: Generate fancy report
        run: |
          chmod +x ./eng/tools/fancy-reports/linux-x64/fancy-reports
          ./eng/tools/fancy-reports/linux-x64/fancy-reports \
            --reports "./test-results" \
            -s "${{ env.SOLUTION_ROOT }}" \
            -o "./fancy-report" \
            -f html-single -f markdown -f json -f badge

      - name: Write coverage summary to job
        if: always()
        run: |
          if [ -f ./fancy-report/coverage.md ]; then
            cat ./fancy-report/coverage.md >> $GITHUB_STEP_SUMMARY
          else
            echo "::warning::coverage.md not found — no coverage summary to write"
          fi

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: always()
        with:
          check_name: Test Results
          files: ./test-results/**/*.trx

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-reports-code-coverage
          path: ./fancy-report/
          if-no-files-found: warn

      - name: Deploy quality report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./fancy-report
          destination_dir: builds/${{ github.run_number }}/reports/code-coverage
          keep_files: true

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: publish — pack, upload, and push NuGet packages for release tags
  #         runs in parallel with `report` after `build` completes
  # ──────────────────────────────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: [create-tag, build]
    if: always() && needs.build.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || startsWith(needs.create-tag.outputs.tag_ref, 'refs/tags/v'))

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag_ref || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Configure NuGet feed
        run: dotnet nuget add source --name ${{ env.NUGET_FEED_NAME }} ${{ env.NUGET_FEED_URL }}

      - name: Restore dependencies
        run: dotnet restore $SOLUTION_ROOT/$SOLUTION_FILE_NAME
        env:
          NuGetPackageSourceCredentials_${{ env.NUGET_FEED_NAME }}: Username=dotnetnate;Password=${{ secrets.PACKAGES_TOKEN }}

      - name: Pack
        run: |
          dotnet pack $SOLUTION_ROOT/$SOLUTION_FILE_NAME -c Release \
            /p:VersionPatch=${{ github.run_number }} \
            /p:PackageVersionMetadata=ci-${{ github.sha }}

      - name: Collect NuGet packages
        run: |
          mkdir -p ./output/packages
          find ./src -name "*.nupkg" -exec cp {} ./output/packages/ \;

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: output-packages
          path: ./output/packages/
          if-no-files-found: warn

      - name: Push the package to GitHub Packages
        run: |
          dotnet nuget push "**/*.nupkg" --no-symbols --skip-duplicate \
            --source "https://nuget.pkg.github.com/dotnetnate/index.json" \
            --api-key ${{ secrets.PACKAGE_PUBLISH_KEY }}
