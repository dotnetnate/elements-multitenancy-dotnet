# Build, test, report code quality, and publish packages
# - Every push/PR: build → test → coverage → quality report (job summary + check run)
# - Main branch only: deploy HTML report to GitHub Pages, pack and push NuGet packages

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write        # push to gh-pages branch
  checks: write          # dorny/test-reporter creates check runs
  pull-requests: write   # test-reporter can comment on PRs
    
env:
  SOLUTION_ROOT: ./src
  SOLUTION_FILE_NAME: src.sln
  
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install reporting tools
      run: |
        dotnet tool install --global dotnet-coverage
        dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Restore dependencies
      run: dotnet restore $SOLUTION_ROOT/$SOLUTION_FILE_NAME

    - name: Build
      run: |
        dotnet build $SOLUTION_ROOT/$SOLUTION_FILE_NAME --no-restore -c Release \
          /p:VersionPatch=${{ github.run_number }} \
          /p:PackageVersionMetadata=ci-${{ github.sha }}

    - name: Count Lines of Code (cloc)
      # Uses the djdefi/cloc-action
      uses: djdefi/cloc-action@6 # Check the marketplace for the latest version tag
      with:
        options: "--exclude-lang=YAML --md --report-file=cloc.md" # Example options: exclude YAML, output Markdown to a file

    # ---------- Test + Coverage Collection ----------
    # Data collector writes binary .coverage files; dotnet-coverage merge
    # converts them to cobertura XML for ReportGenerator.

    - name: Test with coverage
      run: |
        dotnet test $SOLUTION_ROOT/$SOLUTION_FILE_NAME \
          --no-build -c Release \
          --collect "Code Coverage" \
          --settings $SOLUTION_ROOT/codecoverage.runsettings \
          --logger trx \
          --results-directory ./test-results

    - name: List test result artifacts
      if: always()
      run: |
        echo "=== All files ==="
        find ./test-results -type f | sort
        echo ""
        echo "=== Coverage files ==="
        find ./test-results -name "*.coverage" -type f
        echo ""
        echo "=== TRX files ==="
        find ./test-results -name "*.trx" -type f

    - name: Merge coverage to cobertura
      run: |
        COVERAGE_FILES=$(find ./test-results -name "*.coverage" -type f)
        echo "Coverage files found:"
        echo "$COVERAGE_FILES"
        echo "$COVERAGE_FILES" | tr '\n' ' ' | xargs \
          dotnet-coverage merge \
            --output-format cobertura \
            --output ./test-results/coverage.cobertura.xml
        echo ""
        echo "Cobertura size: $(wc -c < ./test-results/coverage.cobertura.xml) bytes"
        head -3 ./test-results/coverage.cobertura.xml

    # ---------- Generate Reports ----------

    - name: Generate coverage report
      if: always()
      run: |
        FILE=./test-results/coverage.cobertura.xml
        if [ ! -f "$FILE" ]; then
          echo "::warning::Cobertura file not found — skipping report"
          exit 0
        fi
        reportgenerator \
          "-reports:$FILE" \
          -targetdir:./coverage-report \
          -reporttypes:"Html;MarkdownSummaryGithub" \
          -assemblyfilters:"+*;-*.Tests.*;-FluentValidation"

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: ./test-results/**/*.trx
        reporter: dotnet-trx

    - name: Write coverage summary to job
      if: always()
      run: |
        if [ -f ./coverage-report/SummaryGithub.md ]; then
          cat ./coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        else
          echo "::warning::SummaryGithub.md not found — no coverage summary to write"
        fi

    # ---------- Deploy Report to GitHub Pages (main only) ----------

    - name: Deploy quality report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./coverage-report
        force_orphan: true

    # ---------- Pack + Push (main only) ----------

    - name: Pack
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        dotnet pack $SOLUTION_ROOT/$SOLUTION_FILE_NAME --no-build -c Release \
          /p:VersionPatch=${{ github.run_number }} \
          /p:PackageVersionMetadata=ci-${{ github.sha }}

    - name: Push the package to GitHub Packages
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        dotnet nuget push "**/*.nupkg" --no-symbols --skip-duplicate \
          --source "https://nuget.pkg.github.com/dotnetnate/index.json" \
          --api-key ${{ secrets.PACKAGE_PUBLISH_KEY }}
